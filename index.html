<style>
  :root{
    --ink:#36213E; --soft:#6E5874; --bg:#FFF7F0; --card:#ffffff;
    --line:#EBD9C8; --coral:#FF6F5E; --mango:#FF9E54;
    --gold:#FFC976; --lagoon:#1E8A8C; --plum:#9A4E78;
    --sunset:linear-gradient(120deg,#FFC976,#FF9E54 45%,#FF6F5E 75%,#9A4E78);
    --tab-h:64px; --nav-h:56px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:#e9e2dc;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",system-ui,sans-serif;
    color:var(--ink);
  }
  .app{
    max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;
    background:var(--bg);position:relative;overflow-x:hidden;
    box-shadow:0 0 40px rgba(0,0,0,.12);
  }
  h1,h2,h3,.serif{font-family:"Lora",Georgia,serif;font-weight:600}
  a{color:inherit}

  /* header */
  header{
    background:var(--sunset);color:#fff;padding:calc(env(safe-area-inset-top) + 16px) 18px 16px;
  }
  header .kick{font-size:11px;letter-spacing:.18em;text-transform:uppercase;font-weight:700;opacity:.92}
  header h1{font-size:23px;margin:3px 0 0;font-weight:600;letter-spacing:-.01em}
  header .sub{font-size:12.5px;opacity:.95;margin-top:2px}

  /* sub-controls (search + chips) */
  .controls{position:sticky;top:var(--nav-h);z-index:20;background:var(--bg);
    border-bottom:1px solid var(--line);padding:10px 0 8px}
  .searchwrap{padding:0 14px 8px}
  .search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);
    border-radius:12px;padding:9px 12px}
  .search input{border:0;outline:0;font-size:15px;flex:1;background:transparent;color:var(--ink)}
  .search svg{flex:none;opacity:.5}
  .chips{display:flex;gap:7px;overflow-x:auto;padding:2px 14px 2px;scrollbar-width:none}
  .chips::-webkit-scrollbar{display:none}
  .chip{flex:none;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;
    color:var(--soft);border-radius:20px;padding:7px 13px;white-space:nowrap;cursor:pointer}
  .chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .chip.grpstart{margin-left:6px;border-left:1px solid var(--line)}

  /* view */
  #view{padding:14px 14px calc(env(safe-area-inset-bottom) + 96px)}
  .seclabel{font-size:11px;letter-spacing:.16em;text-transform:uppercase;font-weight:700;
    color:var(--coral);margin:16px 2px 8px}
  .seclabel.cool{color:var(--lagoon)}
  .count{color:var(--soft);font-weight:600;letter-spacing:0;text-transform:none;font-size:11px;margin-left:6px}

  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px;margin-bottom:11px;cursor:pointer}
  .card .bar{height:4px;border-radius:4px;background:var(--sunset);margin:-13px -14px 11px;border-radius:16px 16px 0 0}
  .card .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .card h3{font-size:16.5px;line-height:1.15;margin:0}
  .card .meta{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;
    color:var(--lagoon);white-space:nowrap;padding-top:3px}
  .card .meta.warm{color:var(--coral)}
  .card .desc{font-size:13px;color:var(--soft);margin:5px 0 0;line-height:1.4}
  .pricerow{display:flex;gap:14px;margin-top:9px}
  .pricerow .pc{font-size:12px;color:var(--soft)}
  .pricerow .pc b{display:block;font-size:14.5px;color:var(--coral);font-weight:700}
  .pricerow .pc.free b{color:var(--lagoon)}
  .tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
  .t{font-size:10.5px;font-weight:600;padding:3px 8px;border-radius:8px;background:#F4ECF1;color:var(--plum)}
  .t.k{background:#E4F3F2;color:var(--lagoon)}
  .t.dist{background:#FBE9DD;color:#C25A36}

  .maplink{display:inline-flex;align-items:center;gap:6px;margin-top:11px;font-size:13px;
    font-weight:700;color:var(--lagoon);text-decoration:none;border:1px solid #CDE7E6;
    background:#EEF8F7;border-radius:10px;padding:8px 11px}
  .maplink svg{flex:none}
  .maplink:active{background:#E0F1F0}

  /* calendar */
  .calhead{display:flex;align-items:baseline;justify-content:space-between;margin:2px 2px 10px}
  .calhead h2{font-size:20px}
  .legend{display:flex;gap:12px;font-size:11px;color:var(--soft);margin:0 2px 10px}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;display:inline-block}
  .dot.b{background:var(--coral)} .dot.p{background:var(--lagoon)}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px}
  .gh{font-size:10px;font-weight:700;color:var(--soft);text-align:center;text-transform:uppercase;letter-spacing:.06em}
  .cell{aspect-ratio:1/1;border-radius:11px;display:flex;flex-direction:column;align-items:center;
    justify-content:center;font-size:14px;font-weight:600;border:1px solid transparent;position:relative;color:#C9BBB0}
  .cell.trip{background:#fff;border-color:var(--line);color:var(--ink);cursor:pointer}
  .cell.sel{background:var(--ink);color:#fff;border-color:var(--ink)}
  .cell .dots{position:absolute;bottom:6px;display:flex;gap:3px}
  .cell.sel .dot.b{background:#fff} .cell.sel .dot.p{background:#9fe3df}

  .daypanel{margin-top:8px}
  .dayhdr{font-family:"Lora",serif;font-weight:600;font-size:19px;margin:6px 2px 2px}
  .daywho{font-size:12.5px;color:var(--soft);margin:0 2px 12px}
  .flagline{font-size:12.5px;background:#FBEAF1;color:var(--plum);border-radius:10px;padding:8px 11px;margin:0 0 12px;font-weight:600}
  .flagline.warn{background:#FFF1E2;color:#B5642A}

  .ev{border-left:3px solid var(--coral);background:#fff;border:1px solid var(--line);
    border-left:3px solid var(--coral);border-radius:0 12px 12px 0;padding:11px 13px;margin-bottom:9px}
  .ev.pencil{border-left-color:var(--lagoon)}
  .ev .et{display:flex;justify-content:space-between;gap:8px;align-items:baseline}
  .ev h3{font-size:15.5px;margin:0}
  .ev .time{font-size:12.5px;font-weight:700;color:var(--coral);white-space:nowrap}
  .ev.pencil .time{color:var(--lagoon)}
  .ev .pl{font-size:12.5px;color:var(--soft);margin:3px 0 0}
  .ev .note{font-size:12px;color:var(--soft);margin:5px 0 0;line-height:1.4}
  .ev .acts{display:flex;gap:10px;margin-top:9px;flex-wrap:wrap}
  .ministep{font-size:12.5px;font-weight:700;color:var(--lagoon);text-decoration:none;display:inline-flex;align-items:center;gap:5px}
  .rm{font-size:12.5px;font-weight:700;color:var(--coral);background:none;border:0;cursor:pointer;padding:0}

  .opt{display:flex;align-items:center;gap:11px;background:#fff;border:1px solid var(--line);
    border-radius:13px;padding:10px 12px;margin-bottom:8px}
  .opt .oi{flex:1;min-width:0}
  .opt h3{font-size:14.5px;margin:0}
  .opt .om{font-size:11.5px;color:var(--soft);margin-top:2px;display:flex;gap:9px;flex-wrap:wrap}
  .opt .om b{color:var(--lagoon);font-weight:700}

/* CALENDAR */
function renderCal(){
  var h="";
  h+='<div class="countdown" id="cd"></div>';
  h+='<div class="calhead"><h2 class="serif">July 2026</h2></div>';
  h+='<div class="legend"><span><i class="dot b"></i>Booked</span><span><i class="dot p"></i>Penciled in</span></div>';
  h+='<div class="grid">'+DOW.map(function(d){return '<div class="gh">'+d+'</div>';}).join("")+'</div>';
  // build cells from Sun of Jul1's week (Jun28) to Sat of Jul12's week (Jul18) = 21 cells
  var start=new Date(2026,6,1); start.setDate(1-start.getDay()); // back to Sunday
  h+='<div class="grid">';
  for(var i=0;i<21;i++){
    var d=new Date(start); d.setDate(start.getDate()+i);
    var inJul=d.getMonth()===6, day=d.getDate();
    var trip = inJul && day>=2 && day<=12;
    var cls="cell"+(trip?" trip":"")+(trip&&day===state.selDay?" sel":"");
    var dots="";
    if(trip){
      if(EVENTS[day]) dots+='<i class="dot b"></i>';
      if(planned[day]&&planned[day].length) dots+='<i class="dot p"></i>';
    }
    h+='<div class="'+cls+'"'+(trip?' data-day="'+day+'"':'')+'>'+(inJul?day:'')+(dots?'<span class="dots">'+dots+'</span>':'')+'</div>';
  }
  h+='</div>';
  h+='<div class="daypanel" id="daypanel">'+renderDay(state.selDay)+'</div>';
  view.innerHTML=h;
  tick();
}

/* live countdown to the afternoon everyone has landed */
function cdbox(n,l){return '<div class="cdbox"><div class="num">'+(n<10?'0'+n:n)+'</div><div class="lab">'+l+'</div></div>';}
function tick(){
  var el=document.getElementById("cd"); if(!el) return;
  var diff=TARGET-Date.now();
  var colo;
  try{ colo=new Date().toLocaleString('en-US',{timeZone:'America/Denver',weekday:'short',month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
  catch(e){ colo=new Date().toLocaleString(); }
  if(diff<=0){
    el.className="countdown done";
    el.innerHTML='<div class="cdlabel">July 4 · 3:00 PM Hawaii time</div>'+
      '<div class="msg">The whole family has landed — let the celebration begin.</div>'+
      '<div class="now">Colorado now · '+colo+'</div>';
    return;
  }
  var d=Math.floor(diff/864e5); diff-=d*864e5;
  var hh=Math.floor(diff/36e5); diff-=hh*36e5;
  var m=Math.floor(diff/6e4); diff-=m*6e4;
  var s=Math.floor(diff/1e3);
  el.className="countdown";
  el.innerHTML='<div class="cdlabel">Until the whole family has landed</div>'+
    '<div class="cdtarget">July 4 · 3:00 PM Hawaii time · everyone arrived</div>'+
    '<div class="cdrow">'+cdbox(d,"Days")+cdbox(hh,"Hours")+cdbox(m,"Mins")+cdbox(s,"Secs")+'</div>'+
    '<div class="now">Colorado now · '+colo+'</div>';
}

function evCard(e){
  var time=e.time?'<span class="time">'+esc(e.time)+'</span>':'';
  return '<div class="ev"><div class="et"><h3>'+esc(e.title)+'</h3>'+time+'</div>'+
    (e.pl?'<div class="pl">'+esc(e.pl)+'</div>':'')+
    (e.note?'<div class="note">'+esc(e.note)+'</div>':'')+
    '<div class="acts">'+miniMap(e)+'</div></div>';
}

function renderDay(day){
  var dt=new Date(2026,6,day), w=dt.getDay();
  var h='<div class="dayhdr">'+DOWL[w]+', July '+day+'</div>';
  var who = day<4 ? "First wave here (5): Dan, Sarah, Isla, Theodore, Marlon" : "Whole group here (13)";
  h+='<div class="daywho">'+who+'</div>';
  // closures / flags
  if(w===0||w===3) h+='<div class="flagline">Closed today: Polynesian Cultural Center</div>';
  if(w===1||w===2) h+='<div class="flagline">Closed today: Hanauma Bay</div>';
  if(day===4) h+='<div class="flagline warn">July 4 — Independence Day. Crowds island-wide; Ko Olina fireworks. A good stay-local day.</div>';

  // booked
  h+='<div class="seclabel">Booked</div>';
  if(EVENTS[day]) h+=EVENTS[day].map(evCard).join("");
  else h+='<div class="empty" style="padding:14px">No fixed plans — wide open.</div>';

  // penciled
  if(planned[day] && planned[day].length){
    h+='<div class="seclabel cool">Penciled in</div>';
    h+=planned[day].map(function(id){
      var a=actById(id); if(!a) return "";
      return '<div class="ev pencil"><div class="et"><h3>'+esc(a.name)+'</h3><span class="time">'+esc(a.driveText)+'</span></div>'+
        '<div class="pl">'+esc(a.adult)+' / adult · '+esc(a.hours)+'</div>'+
        '<div class="acts">'+miniMap(a)+'<button class="rm" data-unplan="'+day+':'+a.id+'">Remove</button></div></div>';
    }).join("");
  }

  // options open today
  var opts=ACTS.filter(function(a){return openOn(a,day);}).sort(function(x,y){return x.drive-y.drive;});
  h+='<div class="seclabel">Could do today <span class="count">'+opts.length+' open</span></div>';
  h+=opts.map(function(a){
    var inplan = planned[day]&&planned[day].indexOf(a.id)>=0;
    return '<div class="opt">'+
      '<div class="oi" data-open="act:'+a.id+'"><h3>'+esc(a.name)+'</h3>'+
        '<div class="om"><b>'+esc(a.driveText)+'</b><span>'+esc(a.adult)+'/adult</span><span>'+esc(a.aud==="15+"?"15+":"Family")+'</span></div></div>'+
      '<button class="add'+(inplan?' in':'')+'" data-plan="'+day+':'+a.id+'">'+(inplan?'✓ In':'+ Pencil in')+'</button>'+
    '</div>';
  }).join("");
  return h;
}

    h+='<p class="note">'+esc(item.note)+'</p>';
  } else if(type==="eat"){ item=DINING.filter(function(d){return d.id===id;})[0];
    h='<div class="shead"><div class="meta">'+esc(item.tier==="Aulani"?"At Aulani":item.tier)+' · '+esc(item.price)+'</div><h2>'+esc(item.name)+'</h2></div>';
    h+=frow("Cuisine",esc(item.cuisine)); h+=frow("Hours",esc(item.hours)); h+=frow("Family-friendly",item.kid?"Yes":"—");
    h+='<p class="note">'+esc(item.desc)+'</p>';
  } else if(type==="shop"){ item=SHOP.filter(function(s){return s.id===id;})[0];
    h='<div class="shead"><div class="meta">'+esc(item.area)+' · '+esc(item.type)+'</div><h2>'+esc(item.name)+'</h2></div>';
    h+=frow("Drive from Aulani",esc(item.drive)); h+=frow("Hours",esc(item.hours));
    h+='<p class="note">'+esc(item.desc)+'</p>';
  } else if(type==="night"){ item=NIGHT.filter(function(n){return n.id===id;})[0];
    h='<div class="shead"><div class="meta">'+esc(item.area)+' · '+esc(item.type)+'</div><h2>'+esc(item.name)+'</h2></div>';
    h+='<p class="note">'+esc(item.desc)+'</p>';
  } else if(type==="sit"){ item=SITTERS.filter(function(s){return s.id===id;})[0];
    h='<div class="shead"><div class="meta">'+esc(item.meta)+'</div><h2>'+esc(item.name)+'</h2></div>';
    h+='<p class="note">'+esc(item.desc)+'</p>';
    h+='<p class="note"><b>Before you book:</b> confirm the sitter is background-checked, CPR/first-aid certified and (for agencies) insured. Most agencies are referral services, with the family as the employer.</p>';
  }
  if(item && !item.noMap && type!=="sit"){
    h+='<a class="bigmap" href="'+mapHref(item)+'" target="_blank" rel="noopener">'+PIN+(item.atResort?"Open in Maps":"Directions & live traffic from Aulani")+'</a>';
  }
  sheetBody.innerHTML=h; sheet.classList.add("open");
}
function closeSheet(){ sheet.classList.remove("open"); }

/* ROUTER */
function render(){
  renderControls();
  if(state.tab==="cal") renderCal();
  else if(state.tab==="do") renderDo();
  else if(state.tab==="eat") renderEat();
  else if(state.tab==="shop") renderShop();
  else if(state.tab==="night") renderNight();
  window.scrollTo(0,0);
}

/* EVENTS */
document.getElementById("tabbar").addEventListener("click",function(e){
  var b=e.target.closest("button[data-tab]"); if(!b) return;
  state.tab=b.getAttribute("data-tab"); state.search="";
  Array.prototype.forEach.call(this.querySelectorAll("button"),function(x){x.classList.remove("on");});
  b.classList.add("on");
  render();
});

document.addEventListener("click",function(e){
  var t;
  if((t=e.target.closest("[data-action='closeSheet']"))){ closeSheet(); return; }
  if((t=e.target.closest("[data-chip]"))){
    var g=t.getAttribute("data-chip"), v=t.getAttribute("data-val");
    var map={do:"doF",eat:"eatF",shop:"shopF",night:"nightF"}[state.tab];
    if(map){ state[map][g]=v; render(); }
    return;
  }
  if((t=e.target.closest("[data-day]"))){ state.selDay=parseInt(t.getAttribute("data-day"),10); renderCal(); return; }
  if((t=e.target.closest("[data-plan]"))){
    var parts=t.getAttribute("data-plan").split(":"), day=parts[0], id=parts[1];
    planned[day]=planned[day]||[];
    var ix=planned[day].indexOf(id);
    if(ix>=0) planned[day].splice(ix,1); else planned[day].push(id);
    if(!planned[day].length) delete planned[day];
    savePlanned(); renderCal(); return;
  }
  if((t=e.target.closest("[data-unplan]"))){
    var p=t.getAttribute("data-unplan").split(":"), dy=p[0], idd=p[1];
    if(planned[dy]){ var j=planned[dy].indexOf(idd); if(j>=0) planned[dy].splice(j,1); if(!planned[dy].length) delete planned[dy]; }
    savePlanned(); renderCal(); return;
  }
  if((t=e.target.closest("[data-open]"))){
    if(e.target.closest(".maplink")) return; // let map links work
    openSheet(t.getAttribute("data-open")); return;
  }
});

controls.addEventListener("input",function(e){
  if(e.target && e.target.id==="searchInput"){
    state.search=e.target.value;
    var pos=e.target.selectionStart;
    if(state.tab==="do") renderDo(); else if(state.tab==="eat") renderEat();
    else if(state.tab==="shop") renderShop(); else if(state.tab==="night") renderNight();
    var again=document.getElementById("searchInput");
    if(again){ again.focus(); try{again.setSelectionRange(pos,pos);}catch(x){} }
  }
});

render();
tick();
setInterval(tick,1000);
</script>
</body>
</html>
